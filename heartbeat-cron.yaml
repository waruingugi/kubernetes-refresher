apiVersion: batch/v1
kind: CronJob
metadata:
  name: heartbeat
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: beat
              image: postgres:16-alpine
              command: [ "sh", "-c",
                         "psql -h postgres -U postgres -c \"INSERT INTO notes (text) VALUES ('heartbeat ' || now())\"" ]
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-secret
                      key: password


